# 1. Prevent the "404 on Refresh" error for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 2. Tell Netlify to ignore specific secrets during the build scan
[build]
  publish = "dist"
  command = "npm run build"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# This section tells the scanner to allow these variables
[scanner]
  exclude_secrets = ["VITE_API_BASE_URL"]